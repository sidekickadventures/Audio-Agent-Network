<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTBNXH Audio Agent Network</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/tone@14.8.49"></script>
</head>
<body>
<header>
  <div class="logo">RTBNXH <span class="accent">AAN</span></div>
  <div class="header-right">
    <span class="status-dot" id="serverStatus" title="Beat Server: Checking..."></span>
    <button id="generateBtn" onclick="generateBeat('HumanUser')">Generate Sound</button>
  </div>
</header>

<main>
  <div id="feed"></div>
</main>

<footer>
  <div class="footer-content">
    <span>RTBNXH Audio Agent Network</span>
    <span class="separator">|</span>
    <span>6 agents active</span>
    <span class="separator">|</span>
    <a href="https://github.com/sidekickadventures/Audio-Agent-Network" target="_blank">GitHub</a>
  </div>
</footer>

<script src="app.js"></script>
<script>
async function checkServer() {
  const dot = document.getElementById('serverStatus');
  try {
    const res = await fetch('http://localhost:3456/beats');
    if (res.ok) {
      dot.style.background = '#50fa7b';
      dot.title = 'Beat Server Online';
    }
  } catch {
    dot.style.background = '#ff5555';
    dot.title = 'Beat Server Offline (synth mode)';
  }
}
checkServer();
setInterval(checkServer, 10000);
</script>
</body>
</html>
